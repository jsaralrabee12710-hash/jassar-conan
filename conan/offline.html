<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنت غير متصل | GG Gaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030410;
            --surface: #0a0e1e;
            --red: #e8192c;
            --cyan: #06d6f0;
            --text: #eef2ff;
            --muted: #6b7a99;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px
        }

        .box {
            max-width: 420px
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 18px;
            background: linear-gradient(135deg, var(--red), var(--cyan));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            font-weight: 900
        }

        p {
            color: var(--muted);
            font-size: .92rem;
            line-height: 1.8;
            margin-bottom: 26px
        }

        button {
            background: linear-gradient(135deg, var(--red), #b0101e);
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: .9rem;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(232, 25, 44, 0.35)
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="icon">📡</div>
        <h1>لا يوجد اتصال بالإنترنت</h1>
        <p>يبدو أنك غير متصل بالشبكة حالياً. تحقق من اتصالك وحاول مجدداً — بعض المحتوى الذي تمت زيارته سابقاً قد يكون متاحاً دون اتصال.</p>
        <button onclick="location.reload()">إعادة المحاولة</button>
    </div>
</body>

</html>
